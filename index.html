<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alias Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#3b82f6,#111827 65%);
    color:white;
    padding:20px;
}

.game{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:30px;
    padding:30px;
    box-shadow:0 0 40px rgba(0,0,0,0.35);
    text-align:center;
}

h1{
    font-size:55px;
    margin-bottom:25px;
}

.teams{
    display:flex;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.team{
    flex:1;
    min-width:250px;
    background:rgba(255,255,255,0.07);
    border-radius:25px;
    padding:25px;
    border:3px solid transparent;
    transition:0.3s;
}

.team.active{
    border-color:#22c55e;
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(34,197,94,0.5);
}

.team h2{
    font-size:32px;
    margin-bottom:10px;
}

.score{
    font-size:65px;
    color:#facc15;
    font-weight:bold;
}

.turn{
    font-size:30px;
    margin-bottom:20px;
    color:#cbd5e1;
}

.timer{
    font-size:90px;
    font-weight:bold;
    margin-bottom:20px;
    color:#22c55e;
}

.word{
    background:white;
    color:#111827;
    border-radius:25px;
    min-height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:55px;
    font-weight:bold;
    padding:20px;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.buttons{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:18px;
    padding:18px 35px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-3px);
}

.start{
    background:#3b82f6;
    color:white;
}

.success{
    background:#22c55e;
    color:white;
}

.skip{
    background:#ef4444;
    color:white;
}

.message{
    margin-top:25px;
    font-size:42px;
    color:#facc15;
    min-height:50px;
    font-weight:bold;
}

@media(max-width:700px){

    .word{
        font-size:38px;
    }

    .timer{
        font-size:65px;
    }

    button{
        width:100%;
    }

}

</style>

let currentTeam = 1;
let scores = {
    1:0,
    2:0
};

let gameRunning = false;
let timeLeft = 60;
let timerInterval = null;

const timerElement = document.getElementById("timer");
const wordElement = document.getElementById("word");
const turnText = document.getElementById("turnText");
const messageElement = document.getElementById("message");

const startBtn = document.getElementById("startBtn");
const successBtn = document.getElementById("successBtn");
const skipBtn = document.getElementById("skipBtn");

function getRandomWord(){

    const randomIndex = Math.floor(Math.random() * words.length);

    return words[randomIndex];
}

function showNewWord(){

    wordElement.textContent = getRandomWord();
}

function updateTeamUI(){

    document.getElementById("team1").classList.remove("active");
    document.getElementById("team2").classList.remove("active");

    document
    .getElementById("team" + currentTeam)
    .classList.add("active");

    turnText.textContent = "תור קבוצה " + currentTeam;
}

function startTurn(){

    if(gameRunning){
        return;
    }

    gameRunning = true;

    messageElement.textContent = "";

    timeLeft = 60;

    timerElement.textContent = timeLeft;

    showNewWord();

    timerInterval = setInterval(() => {

        timeLeft--;

        timerElement.textContent = timeLeft;

        if(timeLeft <= 0){

            clearInterval(timerInterval);

            endTurn();
        }

    },1000);
}

function successWord(){

    if(!gameRunning){
        return;
    }

    scores[currentTeam]++;

    document.getElementById(
        "score" + currentTeam
    ).textContent = scores[currentTeam];

    if(scores[currentTeam] >= 150){

        gameRunning = false;

        clearInterval(timerInterval);

        wordElement.textContent = "🎉";

        messageElement.textContent =
        "🏆 קבוצה " + currentTeam + " ניצחה במשחק!";

        return;
    }

    showNewWord();
}

function skipWord(){

    if(!gameRunning){
        return;
    }

    showNewWord();
}

function endTurn(){

    gameRunning = false;

    wordElement.textContent = "⏰ הזמן נגמר!";

    currentTeam = currentTeam === 1 ? 2 : 1;

    updateTeamUI();
}

startBtn.addEventListener("click", startTurn);

successBtn.addEventListener("click", successWord);

skipBtn.addEventListener("click", skipWord);

updateTeamUI();

</script>
